<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ArchWise 架构风格智能助手</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260603-01">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>
  <main class="app-shell">
    <section class="workbench">
      <header class="topbar">
        <div>
          <p class="eyebrow">ArchWise</p>
          <h1>软件体系结构风格智能助手</h1>
        </div>
        <a class="api-link" href="/docs" target="_blank" rel="noreferrer">API 文档</a>
      </header>

      <section class="input-panel">
        <label for="requirement">需求描述</label>
        <textarea id="requirement">开发一个跨平台的即时通讯系统，要求支持万人同时在线，需要保证消息的实时性和可靠性，后期可能需要快速扩展视频通话功能</textarea>
        <div class="actions">
          <button id="recommendBtn" type="button">生成推荐</button>
          <label class="inline-field" for="topK">
            <span>对比范围</span>
            <select id="topK">
              <option value="12" selected>完整 12 种</option>
              <option value="6">精简 6 种</option>
              <option value="3">重点 3 种</option>
            </select>
          </label>
          <label class="inline-field" for="topologyMode">
            <span>拓扑模式</span>
            <select id="topologyMode">
              <option value="fast" selected>快速</option>
              <option value="precise">精细</option>
            </select>
          </label>
          <label class="inline-field" for="topologyTimeout">
            <span>拓扑等待</span>
            <select id="topologyTimeout">
              <option value="8">8 秒</option>
              <option value="12" selected>12 秒</option>
              <option value="20">20 秒</option>
              <option value="30">30 秒</option>
              <option value="0">无上限</option>
            </select>
          </label>
          <label class="inline-field" for="topologyRounds">
            <span>补全轮数</span>
            <select id="topologyRounds">
              <option value="0">0 轮</option>
              <option value="1" selected>1 轮</option>
              <option value="2">2 轮</option>
              <option value="3">3 轮</option>
            </select>
          </label>
          <span id="status">等待输入</span>
        </div>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>最终推荐</h2>
          <div id="winner" class="winner empty">暂无结果</div>
        </article>
        <article class="panel">
          <h2>需求特征</h2>
          <div id="features" class="feature-list empty">暂无结果</div>
        </article>
      </section>

      <section class="panel">
        <div class="panel-title-row">
          <h2>架构组合推荐</h2>
          <span id="compositionStatus" class="section-meta">暂无结果</span>
        </div>
        <div id="composition" class="composition empty">暂无结果</div>
      </section>

      <section class="panel">
        <div class="panel-title-row">
          <h2>候选架构对比矩阵</h2>
          <span id="matrixCount" class="section-meta">暂无结果</span>
        </div>
        <div class="table-wrap">
          <table id="matrix"></table>
        </div>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>评估报告</h2>
          <div id="report" class="report markdown-body">暂无结果</div>
        </article>
        <article class="panel">
          <details class="trace-box decision-box" open>
            <summary>
              <span>决策溯源</span>
              <small id="decisionSummary">暂无决策证据</small>
            </summary>
            <div id="decisionTrace" class="decision-trace empty">暂无结果</div>
          </details>
        </article>
      </section>

      <section class="panel">
          <details class="trace-box">
            <summary>
              <span>Agent 协作追踪</span>
              <small id="traceSummary">暂无推理过程</small>
            </summary>
            <ol id="trace" class="trace"></ol>
          </details>
      </section>

      <section class="panel">
        <div class="panel-title-row">
          <h2>架构拓扑图</h2>
          <div class="copy-actions">
            <button id="zoomOutBtn" type="button" class="ghost-button">缩小</button>
            <button id="zoomResetBtn" type="button" class="ghost-button">适配</button>
            <button id="zoomInBtn" type="button" class="ghost-button">放大</button>
            <button id="fullscreenTopologyBtn" type="button" class="ghost-button">大图查看</button>
            <button id="copyTopologyJsonBtn" type="button" class="ghost-button">复制拓扑 JSON</button>
            <button id="copySvgBtn" type="button" class="ghost-button">复制 SVG</button>
          </div>
        </div>
        <div id="topologyTabs" class="tabs"></div>
        <div id="topology" class="topology"></div>
      </section>
    </section>
  </main>
  <div id="toastRoot" class="toast-root" aria-live="polite" aria-atomic="true"></div>
  <div id="topologyModal" class="topology-modal" aria-hidden="true">
    <div class="topology-modal-header">
      <strong>架构拓扑大图</strong>
      <div class="copy-actions">
        <button id="modalZoomOutBtn" type="button" class="ghost-button">缩小</button>
        <button id="modalZoomResetBtn" type="button" class="ghost-button">适配</button>
        <button id="modalZoomInBtn" type="button" class="ghost-button">放大</button>
        <button id="closeTopologyModalBtn" type="button" class="ghost-button">关闭</button>
      </div>
    </div>
    <div id="topologyModalCanvas" class="topology-modal-canvas"></div>
  </div>
  <script src="/static/app.js?v=20260603-01"></script>
</body>
</html>
